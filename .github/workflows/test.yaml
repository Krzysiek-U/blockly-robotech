name: Build and Deploy Blockly
on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          for i in {1..5}; do
            sudo rm -rf /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock
            sudo apt-get update -y && \
            sudo apt-get install -y --no-install-recommends subversion python2-minimal default-jre && \
            break || \
            (echo "System zablokowany, próba $i..." && sleep 5)
          done
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Build Maze
        run: |
          make deps || echo "SVN error"
          make maze-pl

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appengine
          force_orphan: true
