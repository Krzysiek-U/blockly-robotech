name: Build and Deploy
on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # 22.04 jest nowsze, ale wciąż pozwala na instalację Pythona 2 przez akcję
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 2.7
        uses: actions/setup-python@v5
        with:
          python-version: '2.7'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Subversion
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion

      - name: Build
        run: |
          # Blockly Games używa komendy 'python', akcja setup-python tworzy alias automatycznie
          make deps || echo "Ignoruję błędy SVN"
          make maze-pl

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appengine
