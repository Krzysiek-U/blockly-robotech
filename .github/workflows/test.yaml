name: Build and Deploy
on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Używamy nowszego obrazu Bullseye, który ma działające repozytoria
    container:
      image: python:2.7-bullseye

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          # Bullseye ma sprawne serwery, więc update przejdzie bez błędu 100
          apt-get update
          apt-get install -y subversion default-jre-headless

      - name: Build Maze
        run: |
          # Budowanie gier
          make deps || echo "Problemy z SVN - ignoruję"
          make maze-pl

      - name: Deploy
        # Ta akcja musi zostać uruchomiona po wyjściu z kontenera Pythona, 
        # dlatego używamy mechanizmu upload/download artifact lub budujemy wszystko w jednym kroku.
        # Dla uproszczenia: spróbujmy odpalić to wewnątrz, jeśli Node na to pozwoli.
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appengine
          force_orphan: true
