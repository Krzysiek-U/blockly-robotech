name: Build and Deploy Blockly
on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    # Używamy najnowszego systemu, żeby nie czekać w kolejce
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python 2.7 (Legacy Support)
        run: |
          # Pobieramy Pythona 2 z archiwów, bo ubuntu-latest go nie ma
          sudo apt-get update
          sudo apt-get install -y python2-minimal subversion default-jre
          # Tworzymy alias dla Makefile
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Build Maze
        run: |
          # Pobieranie bibliotek (ignorujemy błędy sieciowe SVN)
          make deps || echo "SVN error - kontynuuję z tym co jest"
          # Kompilacja Labiryntu
          make maze-pl

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appengine
          force_orphan: true
