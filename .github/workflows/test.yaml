name: Build and Deploy
on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # Wracamy do 20.04, bo tylko tu ręczna instalacja pythona2 zadziała
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Legacy Tools
        run: |
          sudo apt-get update
          # Instalujemy pythona2 bezpośrednio z apt
          sudo apt-get install -y python2-minimal subversion default-jre
          # Ustawiamy go jako domyślny 'python' dla Makefile
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Build Maze
        run: |
          # Pobieranie zależności i kompilacja
          make deps || echo "SVN error - ignoruję"
          make maze-pl

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appengine
          force_orphan: true
