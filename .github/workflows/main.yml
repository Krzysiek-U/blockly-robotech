name: Build and Deploy Blockly Robotech
on:
  push:
    branches: [ master ] # Blockly Games domyślnie używa master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master # Wymuszamy pobranie gałęzi master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          python3 make.py deps

      - name: Build Maze
        run: |
          python3 make.py maze

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blockly-games-build
          path: appengine/
