name: Build and Deploy Blockly Robotech
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Build Games
        run: |
          # Twoje repozytorium używa Makefile zamiast make.py
          make maze

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blockly-games-build
          path: appengine/
