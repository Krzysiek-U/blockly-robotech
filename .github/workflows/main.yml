name: Build and Deploy Blockly
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # Blockly Games wymaga: 
          # 1. Subversion do pobrania bibliotek
          # 2. Pythona 2 do skryptów budowania
          # 3. Javy (default-jre) do kompilatora Closure
          sudo apt-get install -y subversion python2-minimal default-jre
          # Ustawienie Pythona 2 jako domyślnego
          sudo ln -s /usr/bin/python2 /usr/bin/python

      - name: Build Maze
        run: |
          # 1. Pobranie zewnętrznych bibliotek (Blockly, Closure itp.)
          make deps
          # 2. Kompilacja Labiryntu w wersji polskiej
          # To stworzy brakujące pliki w folderze maze/generated/
          make maze-pl

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Publikujemy zawartość folderu appengine na branch gh-pages
          publish_dir: ./appengine
          force_orphan: true
