name: Build and Deploy Blockly Robotech
on:
  push:
    branches: [ "**" ] # Reaguj na każdą gałąź
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - List files
        run: |
          echo "Gdzie ja jestem?"
          pwd
          echo "Co tu jest?"
          ls -R

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          # Jeśli plik jest głębiej, znajdziemy go
          FILE=$(find . -name "make.py" -print -quit)
          if [ -z "$FILE" ]; then
            echo "BŁĄD: Nie znaleziono make.py w żadnym folderze!"
            exit 1
          fi
          DIR=$(dirname "$FILE")
          cd "$DIR"
          python3 make.py deps
          python3 make.py maze

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blockly-games-build
          path: "**/appengine/"
