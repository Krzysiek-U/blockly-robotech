name: Build and Deploy Blockly Robotech
on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion wget
          # Sprawdzamy czy svn na pewno jest
          svn --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install Dependencies
        run: |
          # Próbujemy pobrać zależności, jeśli svn zawiedzie, zobaczymy błąd
          make deps || (echo "Błąd pobierania deps! Sprawdzam logi..." && exit 1)

      - name: Build Maze
        run: |
          make maze

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: appengine
          branch: gh-pages
