name: Build and Deploy Blockly Robotech
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Rozwiązuje problem z ostrzeżeniem o Node 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Wyższa wersja Javy dla lepszej stabilności kompilatora

      - name: Install Dependencies
        run: |
          python3 make.py deps

      - name: Build Maze
        run: |
          # Uruchamiamy kompilację Maze
          python3 make.py maze

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blockly-games-build
          path: appengine/
