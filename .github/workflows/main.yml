name: Build and Deploy
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion python3

      - name: Build Maze
        run: |
          # Próbujemy zbudować maze, pomijając błędy pobierania jeśli pliki już są
          make maze || echo "Próbuję budować dalej..."
          
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: gra-maze
          path: appengine/
