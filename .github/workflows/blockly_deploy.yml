name: Ostateczny Build i Deploy
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    # ZMIANA: Używamy starszej wersji systemu, która wspiera Pythona 2.7
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          # Na Ubuntu 20.04 te pakiety zainstalują się bez problemu
          sudo apt-get install -y subversion python2-minimal default-jre
          # Ustawiamy alias, żeby komenda 'python' wskazywała na wersję 2
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Build Maze
        run: |
          # Pobieranie zależności i kompilacja Labiryntu
          make deps || true
          make maze-pl

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appengine
          force_orphan: true
