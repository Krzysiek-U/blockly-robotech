name: Ostateczny Build i Deploy
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          # Próba naprawy błędu 100 poprzez czyszczenie i wymuszenie aktualizacji
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends subversion python2-minimal default-jre
          # Ustawienie Pythona 2
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Build Maze
        run: |
          # make deps często wywala błędy sieciowe przy svn, używamy '|| true' żeby iść dalej
          make deps || true
          # Główna kompilacja
          make maze-pl

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appengine
          force_orphan: true
