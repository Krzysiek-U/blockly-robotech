name: Ostateczny Build i Deploy
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    # KLUCZOWE: Zmieniamy na 20.04, bo tylko tam Python 2 działa stabilnie
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          # Instalujemy niezbędne narzędzia dla starego Blockly
          sudo apt-get install -y subversion python2-minimal default-jre
          # Ustawiamy alias, by 'python' wskazywał na wersję 2
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Build Maze
        run: |
          # Próbujemy pobrać zależności - dodajemy flagę, by nie pytał o certyfikaty SVN
          make deps || true
          # Kompilacja Labiryntu
          make maze-pl

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appengine
          force_orphan: true
