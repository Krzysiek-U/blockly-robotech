name: Ostateczny Build i Deploy
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          # Czyścimy listy pakietów, które mogą być uszkodzone
          sudo rm -rf /var/lib/apt/lists/*
          # Wymuszamy aktualizację i instalację bez pytań
          sudo apt-get update -y
          sudo apt-get install -y -f subversion python2-minimal default-jre
          # Ustawiamy alias dla Pythona
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Build Maze
        run: |
          # Pobranie bibliotek i kompilacja Labiryntu
          make deps || true
          make maze-pl

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appengine
          force_orphan: true
