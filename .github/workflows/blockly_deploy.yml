name: Ostateczny Build i Deploy
on:
  push:
    branches: [ master ]
  workflow_dispatch:

# DODAJ TO: Uprawnienia do tworzenia brancha i publikacji strony
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion python2-minimal default-jre
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Build Maze
        run: |
          # Zwiększamy szansę na sukces, ignorując błędy SVN
          make deps || echo "Problemy z SVN, ale próbuję dalej..."
          make maze-pl

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appengine
          force_orphan: true
