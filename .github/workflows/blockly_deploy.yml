name: Ostateczny Build i Deploy
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Zamiast apt-get, używamy gotowej akcji do Javy (potrzebna do kompilatora)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Zamiast apt-get, używamy akcji do Pythona 2
      - name: Set up Python 2.7
        uses: actions/setup-python@v5
        with:
          python-version: '2.7'

      - name: Install Subversion
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion

      - name: Build Maze
        run: |
          # Próbujemy pobrać zależności i budować
          make deps || true
          make maze-pl

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appengine
          force_orphan: true
