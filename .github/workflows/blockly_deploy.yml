name: Ostateczny Build i Deploy
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update || true
          # SVN do pobierania, Python 2 do skryptów, JRE do kompilatora Closure
          sudo apt-get install -y --no-install-recommends subversion python2-minimal default-jre
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Build Maze
        run: |
          # Pobranie bibliotek (Blockly itp.)
          make deps
          # Kompilacja Labiryntu w wersji polskiej
          make maze-pl

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Publikujemy zawartość folderu appengine na branch gh-pages
          publish_dir: ./appengine
          force_orphan: true
