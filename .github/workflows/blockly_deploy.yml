name: Ostateczny Build i Deploy
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # Usuwamy wszelkie blokady i stare listy pakietów
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get clean
          # Instalacja z wymuszeniem braku pytań i naprawą zależności
          sudo apt-get update -y
          sudo apt-get install -y -f --no-install-recommends subversion python2-minimal default-jre
          # Ustawienie aliasu dla Pythona
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Build Maze
        run: |
          # Próba pobrania i budowania, ignorujemy błędy sieciowe SVN
          make deps || true
          make maze-pl

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appengine
          force_orphan: true
